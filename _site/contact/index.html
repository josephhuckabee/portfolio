  <main id="main" role="main">
    <section class="contact contact-hero" aria-labelledby="contact-heading">
  <div class="contact-copy">
    <p class="contact-eyebrow">Let’s build something sharp.</p>
    <h1 id="contact-heading">We want to hear from you!</h1>
    <p class="contact-lede">Whether you’re inquiring about services or just have a question, we're here to help.</p>
    <div class="contact-pills" aria-hidden="true">
      <span>UX/UI</span>
      <span>Web & Apps</span>
      <span>Data</span>
      <span>Brand</span>
    </div>
  </div>
<form id="contact-form" class="contact-form" name="contact" aria-label="Contact form">  <fieldset>
      <legend>Contact Form</legend>
      <label class="sr-only" for="website">Website</label>
      <input type="text" id="website" name="website" autocomplete="off" tabindex="-1" aria-hidden="true" style="position:absolute;left:-9999px;" />
      <input type="text" id="fname" name="firstName" placeholder="First name" required />
      <input type="text" id="lname" name="lastName" placeholder="Last name" required />
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required />

      <label for="message">Message</label>
<textarea id="message" name="message" placeholder="How can I help?" required></textarea>

      <button type="submit">Submit</button>
    </fieldset>
  </form>
  <p id="form-status" aria-live="polite"></p>

<script>
  (function () {
    const form = document.getElementById("contact-form");
    const status = document.getElementById("form-status");

    if (!form || !status) return;

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const data = Object.fromEntries(new FormData(form));

      try {
        const res = await fetch("/api/contact", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });

        if (res.ok) {
          status.textContent = "Message sent successfully.";
          form.reset();
        } else {
          status.textContent = "Sorry, something went wrong. Please try again.";
        }
      } catch (err) {
        status.textContent = "Sorry, something went wrong. Please try again.";
      }
    });
  })();
</script>
