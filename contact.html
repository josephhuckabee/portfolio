  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Joseph Huckabee",
      "url": "https://builtbyjoseph.com",
      "jobTitle": "Front-End Developer and Digital Designer",
      "homeLocation": "New York, NY",
      "image": "https://builtbyjoseph.com/headshot.jpeg",

<body class="contact-page">
  <a class="skip-link" href="#main">Skip to content</a>

  <main id="main" role="main">
    <section class="contact-modal-page" aria-labelledby="contact-heading">
      <a class="contact-close" href="index.html">Close</a>
      <p class="contact-eyebrow">Quick Contact</p>
      <h1 id="contact-heading">Let's reach your goals together.</h1>
      <form id="contact-form" class="contact-form" name="contact" action="/api/contact" method="POST" aria-label="Contact form">
        <fieldset>
      <legend>Quick contact form</legend>
      <input type="text" id="website" name="website" autocomplete="off" tabindex="-1" aria-hidden="true" style="position:absolute;left:-9999px;" />

      <label for="name">Name</label>
      <input type="text" id="name" name="name" autocomplete="name" required />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="email" required />

      <label for="message">Message</label>
      <textarea id="message" name="message" required></textarea>

      <button type="submit">Send</button>
        </fieldset>
      </form>
    </section>

  </main>

  <script src="main.js"></script>
  
</body>
