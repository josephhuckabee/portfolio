    <h1 id="contact-heading">We want to hear from you!</h1>

<form id="contact-form" class="contact-form" name="contact" action="/api/contact" method="POST" aria-label="Contact form">  <fieldset>
      <legend>Contact Form</legend>
      <input type="text" id="website" name="website" autocomplete="off" tabindex="-1" aria-hidden="true" style="position:absolute;left:-9999px;" />
      <label for="fname">First name</label>
      <input type="text" id="fname" name="firstName" placeholder="First name" autocomplete="given-name" required />
      <label for="lname">Last name</label>
      <input type="text" id="lname" name="lastName" placeholder="Last name" autocomplete="family-name" required />
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required />

      <label for="message">Message</label>
<textarea id="message" name="message" placeholder="How can I help?" required></textarea>

      <button type="submit">Submit</button>
    </fieldset>
  </form>
